# ViewGraph CI Pipeline
#
# Runs lint, tests (server + extension), and extension builds on every push
# to main and every PR. Server tests run on Node 18/20/22; extension tests
# on Node 18/22. Builds produce Chrome and Firefox artifacts.
#
# See: .kiro/specs/ci-test-matrix/ for the full spec.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint

  test-server:
    name: Server Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:server

  test-extension:
    name: Extension Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test:ext

  build:
    name: Build Extension (${{ matrix.browser }})
    needs: [lint, test-server, test-extension]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build extension
        working-directory: extension
        run: npx wxt build --browser ${{ matrix.browser }} --mv3
      - uses: actions/upload-artifact@v4
        with:
          name: viewgraph-${{ matrix.browser }}
          path: extension/.output/${{ matrix.browser }}-mv3/
          retention-days: 30
