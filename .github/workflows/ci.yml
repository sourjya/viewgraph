name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Extension unit tests
        run: cd extension && npx vitest run --silent

      - name: Server unit tests
        run: cd server && npx vitest run tests/unit --silent

      - name: Vitest plugin tests
        run: cd packages/vitest && npx vitest run tests/ --silent

      - name: Build extension
        run: cd extension && npx wxt build

      - name: Bundle size check
        run: node scripts/check-bundle-size.js

      - name: Lint
        run: npx eslint . --max-warnings 10

      - name: No hardcoded hex colors in sidebar
        run: |
          count=$(grep -roh "'#[0-9a-fA-F]\{3,8\}'" extension/lib/sidebar/ --include="*.js" | grep -v tokens.js | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "ERROR: $count hardcoded hex colors found in sidebar (use tokens.js)"
            grep -rn "'#[0-9a-fA-F]\{3,8\}'" extension/lib/sidebar/ --include="*.js" | grep -v tokens.js
            exit 1
          fi
          echo "OK: zero hardcoded hex colors in sidebar"
