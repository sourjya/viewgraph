<!DOCTYPE html>
<!--
  ViewGraph Options Page

  Lets users configure project mappings: URL patterns to captures directories.
  The extension matches the current tab URL against these patterns and sends
  the corresponding capturesDir with each HTTP push to the MCP server.
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ViewGraph Options</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0f0f1a; color: #e0e0e0;
      padding: 24px; max-width: 600px; margin: 0 auto;
    }
    h1 { font-size: 18px; color: #a5b4fc; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #666; margin-bottom: 20px; }
    h2 { font-size: 14px; color: #94a3b8; margin: 20px 0 8px; }
    .mapping {
      display: flex; gap: 8px; margin-bottom: 8px; align-items: center;
    }
    .mapping input {
      flex: 1; padding: 8px 10px; background: #1a1a2e; border: 1px solid #333;
      border-radius: 6px; color: #e0e0e0; font-size: 13px;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .mapping input:focus { outline: none; border-color: #6366f1; }
    .mapping input::placeholder { color: #475569; }
    .mapping .remove-btn {
      background: transparent; border: none; color: #666; cursor: pointer;
      font-size: 16px; padding: 4px 8px; border-radius: 4px;
    }
    .mapping .remove-btn:hover { color: #f87171; background: #1f0d0d; }
    .add-btn {
      background: #1a1a2e; border: 1px dashed #333; border-radius: 6px;
      color: #666; padding: 8px; width: 100%; cursor: pointer;
      font-size: 12px; margin-bottom: 16px;
    }
    .add-btn:hover { border-color: #6366f1; color: #a5b4fc; }
    .save-btn {
      background: #6366f1; border: none; border-radius: 6px;
      color: white; padding: 10px 20px; font-size: 13px; font-weight: 600;
      cursor: pointer;
    }
    .save-btn:hover { opacity: 0.9; }
    .status { font-size: 12px; color: #4ade80; margin-left: 12px; display: none; }
    .hint { font-size: 11px; color: #555; margin-bottom: 12px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>ViewGraph Settings</h1>
  <p class="subtitle">Configure project mappings for multi-project capture routing</p>

  <h2>Project Mappings</h2>
  <p class="hint">
    Map URL patterns to captures directories. The extension matches the current page URL
    and tells the MCP server where to write captures. Use <code>*</code> as a catch-all default.
  </p>

  <div id="mappings"></div>
  <button class="add-btn" id="addBtn">+ Add mapping</button>

  <button class="save-btn" id="saveBtn">Save</button>
  <span class="status" id="status">Saved!</span>

  <script src="./options.js" type="module"></script>
</body>
</html>
