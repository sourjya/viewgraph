<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: #16161e;
      color: #c8c8d0;
    }
    .container {
      padding: 12px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a3a;
    }
    .header img {
      border-radius: 3px;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e4e4eb;
      letter-spacing: 0.3px;
      line-height: 18px;
    }
    .header .version {
      font-size: 9px;
      color: #555;
      font-weight: 400;
    }
    .tools {
      display: flex;
      gap: 2px;
    }
    .tool-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #9898a8;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }
    .tool-btn:hover {
      background: #22223a;
      color: #c8c8e0;
    }
    .tool-btn:active {
      background: #2a2a4a;
    }
    .tool-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .tool-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tool-btn:hover svg { stroke: #a5b4fc; }
    .status {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 10px;
      line-height: 1.4;
      display: none;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .status.visible { display: block; }
    .status.info { background: #1a1a2e; color: #7888a0; }
    .status.success { background: #0d1f17; color: #4ade80; }
    .status.error { background: #1f0d0d; color: #f87171; }
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid #2a2a3a;
    }
    .settings-toggle button {
      border: none; background: transparent; cursor: pointer;
      color: #555; display: flex; align-items: center; gap: 4px;
      font-size: 9px; font-family: system-ui, sans-serif;
      padding: 2px 6px; border-radius: 4px;
    }
    .settings-toggle button:hover { color: #888; background: #22223a; }
    .settings-toggle button svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.5; }
    .settings-panel {
      display: none;
      margin-top: 6px;
      padding: 8px;
      background: #1a1a2a;
      border-radius: 6px;
    }
    .settings-panel.visible { display: block; border-top: 1px solid #2a2a3a; padding-top: 10px; margin-top: 8px; }
    .settings-panel label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 10px;
      color: #9898a8;
      cursor: pointer;
    }
    .settings-panel label:hover { color: #c8c8d0; }
    .settings-panel input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 28px; height: 16px; border-radius: 8px;
      background: #3a3a4a; position: relative; cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    .settings-panel input[type="checkbox"]::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      background: #888; transition: transform 0.2s, background 0.2s;
    }
    .settings-panel input[type="checkbox"]:checked {
      background: #6366f1;
    }
    .settings-panel input[type="checkbox"]:checked::after {
      transform: translateX(12px); background: #fff;
    }
    .settings-panel input[type="checkbox"]:disabled {
      opacity: 0.5; cursor: default;
    }
    .conn-status {
      display: flex; align-items: center; gap: 6px;
      padding: 6px 12px; margin-top: 6px;
      border-top: 1px solid #2a2a3a;
      font-size: 9px; color: #666;
      font-family: system-ui, sans-serif;
    }
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #666; flex-shrink: 0;
      transition: background 0.3s;
    }
    .conn-dot.connected { background: #4ade80; }
    .conn-dot.failed { background: #f87171; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <img src="/icon-48.png" alt="" width="18" height="18">
      <h1>ViewGraph</h1>
      <span class="version">v0.1</span>
    </div>
    <div class="tools">
      <button class="tool-btn" id="captureBtn" title="Capture full page DOM">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
        Capture
      </button>
      <button class="tool-btn" id="annotateBtn" title="Select elements and annotate">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
        Annotate
      </button>
    </div>
    <div class="status" id="status"></div>
    <div class="settings-toggle">
      <button id="settingsBtn">
        <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Settings
      </button>
    </div>
    <div class="settings-panel" id="settingsPanel">
      <label><input type="checkbox" id="captureJson" checked disabled> JSON capture</label>
      <label><input type="checkbox" id="captureHtml"> HTML snapshot</label>
      <label><input type="checkbox" id="captureScreenshot"> Screenshot</label>
    </div>
    <div class="conn-status" id="connStatus">
      <span class="conn-dot" id="connDot"></span>
      <span class="conn-text" id="connText">Checking...</span>
    </div>
  </div>
  <script type="module" src="./popup.js"></script>
</body>
</html>
