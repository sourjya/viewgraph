<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 220px;
      padding: 12px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #16161e;
      color: #c8c8d0;
    }
    .header {
      display: flex;
      align-items: baseline;
      gap: 6px;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2a2a3a;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e4e4eb;
      letter-spacing: 0.3px;
    }
    .header .version {
      font-size: 9px;
      color: #555;
      font-weight: 400;
    }
    .tools {
      display: flex;
      gap: 2px;
    }
    .tool-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 4px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: #9898a8;
      font-size: 10px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.12s;
    }
    .tool-btn:hover {
      background: #22223a;
      color: #c8c8e0;
    }
    .tool-btn:active {
      background: #2a2a4a;
    }
    .tool-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }
    .tool-btn svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .tool-btn:hover svg { stroke: #a5b4fc; }
    .status {
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 10px;
      line-height: 1.4;
      display: none;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
    }
    .status.visible { display: block; }
    .status.info { background: #1a1a2e; color: #7888a0; }
    .status.success { background: #0d1f17; color: #4ade80; }
    .status.error { background: #1f0d0d; color: #f87171; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ViewGraph</h1>
    <span class="version">v0.1</span>
  </div>
  <div class="tools">
    <button class="tool-btn" id="captureBtn" title="Capture full page DOM">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/></svg>
      Capture
    </button>
    <button class="tool-btn" id="inspectBtn" title="Inspect and select elements">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/></svg>
      Inspect
    </button>
    <button class="tool-btn" id="reviewBtn" title="Review mode (coming soon)" disabled>
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      Review
    </button>
  </div>
  <div class="status" id="status"></div>
  <script type="module" src="./popup.js"></script>
</body>
</html>
