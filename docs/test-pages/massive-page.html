<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>T2: Massive Page (5000 elements)</title>
  <style>
    body { margin: 0; font-family: system-ui; background: #111; color: #eee; }
    .grid { display: flex; flex-wrap: wrap; gap: 2px; padding: 8px; }
    button { padding: 4px 8px; font-size: 10px; background: #333; color: #ccc; border: 1px solid #555; cursor: pointer; }
    a { color: #6366f1; font-size: 10px; padding: 2px 4px; }
    input { width: 60px; font-size: 10px; padding: 2px; background: #222; color: #ccc; border: 1px solid #444; }
  </style>
</head>
<body>
  <h1>T2: Massive Page - 5000 Interactive Elements</h1>
  <p>Tests: traversal performance, capture size, auto-capture skip threshold.</p>
  <div class="grid" id="grid"></div>
  <script>
    const grid = document.getElementById('grid');
    for (let i = 0; i < 1667; i++) {
      const btn = document.createElement('button');
      btn.textContent = `Btn ${i}`;
      btn.setAttribute('data-testid', `btn-${i}`);
      grid.appendChild(btn);
      const a = document.createElement('a');
      a.href = `#item-${i}`;
      a.textContent = `Link ${i}`;
      grid.appendChild(a);
      const inp = document.createElement('input');
      inp.placeholder = `Input ${i}`;
      grid.appendChild(inp);
    }
  </script>
</body>
</html>
