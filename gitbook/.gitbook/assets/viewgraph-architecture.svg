<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="320" rx="12" fill="url(#bg)"/>

  <!-- Row 1: Your App → Browser → Extension captures DOM -->

  <!-- Your App -->
  <rect x="30" y="40" width="150" height="56" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="63" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.5">ANY STACK</text>
  <text x="105" y="80" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Your App</text>

  <!-- Arrow 1 -->
  <line x1="180" y1="68" x2="225" y2="68" stroke="#475569" stroke-width="2" stroke-dasharray="6 3"/>
  <polygon points="225,63 235,68 225,73" fill="#475569"/>
  <text x="207" y="58" text-anchor="middle" fill="#64748b" font-size="9">HTML</text>

  <!-- Browser -->
  <rect x="235" y="40" width="150" height="56" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="310" y="63" text-anchor="middle" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="0.5">RENDERS UI</text>
  <text x="310" y="80" text-anchor="middle" fill="#e2e8f0" font-size="14" font-weight="700">Browser</text>

  <!-- Arrow 2 -->
  <line x1="385" y1="68" x2="430" y2="68" stroke="url(#accent)" stroke-width="2.5"/>
  <polygon points="430,62 442,68 430,74" fill="#8b5cf6"/>

  <!-- Extension (highlighted) -->
  <rect x="442" y="30" width="200" height="76" rx="12" fill="#1e1b4b" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>
  <text x="542" y="53" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="0.5">VIEWGRAPH EXTENSION</text>
  <text x="542" y="72" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Captures DOM + Enrichment</text>
  <text x="542" y="92" text-anchor="middle" fill="#818cf8" font-size="11">17 collectors - click - annotate</text>

  <!-- Vertical arrow down from Extension -->
  <line x1="542" y1="106" x2="542" y2="145" stroke="url(#accent)" stroke-width="2.5"/>
  <polygon points="536,145 542,157 548,145" fill="#8b5cf6"/>
  <text x="560" y="132" fill="#a5b4fc" font-size="9" font-weight="600">.viewgraph/</text>

  <!-- Row 2: Agent ← MCP ← ViewGraph Server -->

  <!-- ViewGraph Server (highlighted) -->
  <rect x="422" y="160" width="240" height="76" rx="12" fill="#1e1b4b" stroke="url(#accent)" stroke-width="2" filter="url(#shadow)"/>
  <text x="542" y="183" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600" letter-spacing="0.5">VIEWGRAPH MCP SERVER</text>
  <text x="542" y="202" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">37 Tools - Query - Audit - Diff</text>
  <text x="542" y="220" text-anchor="middle" fill="#818cf8" font-size="11">500 tokens vs 100K screenshot</text>

  <!-- Arrow left from Server to Agent -->
  <line x1="422" y1="198" x2="340" y2="198" stroke="url(#green)" stroke-width="2.5"/>
  <polygon points="340,192 328,198 340,204" fill="#10b981"/>
  <text x="380" y="188" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600">MCP Protocol</text>

  <!-- AI Agent -->
  <rect x="100" y="160" width="228" height="76" rx="12" fill="#052e16" stroke="url(#green)" stroke-width="2" filter="url(#shadow)"/>
  <text x="214" y="183" text-anchor="middle" fill="#6ee7b7" font-size="10" font-weight="600" letter-spacing="0.5">YOUR AI AGENT</text>
  <text x="214" y="203" text-anchor="middle" fill="#e2e8f0" font-size="13" font-weight="700">Kiro - Claude - Cursor - Windsurf</text>
  <text x="214" y="221" text-anchor="middle" fill="#86efac" font-size="11">Reads capture → finds source → fixes code</text>

  <!-- Bottom: Key benefits bar -->
  <rect x="30" y="265" width="740" height="40" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>

  <!-- Benefit pills -->
  <rect x="45" y="273" width="120" height="24" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="105" y="289" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Any web app</text>

  <rect x="180" y="273" width="120" height="24" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="240" y="289" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Any MCP agent</text>

  <rect x="315" y="273" width="140" height="24" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="385" y="289" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">100% local - no cloud</text>

  <rect x="470" y="273" width="140" height="24" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="540" y="289" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">50-200x fewer tokens</text>

  <rect x="625" y="273" width="130" height="24" rx="12" fill="rgba(99,102,241,0.15)"/>
  <text x="690" y="289" text-anchor="middle" fill="#a5b4fc" font-size="10" font-weight="600">Zero config setup</text>
</svg>
