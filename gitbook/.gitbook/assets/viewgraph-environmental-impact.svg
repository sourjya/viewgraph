<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 680" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#0c0f1a"/>
      <stop offset="100%" stop-color="#1a1f35"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="glow-red"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="glow-green"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="680" rx="16" fill="url(#bg)"/>

  <!-- Title block -->
  <text x="480" y="38" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="600" letter-spacing="2">THE ENVIRONMENTAL COST OF</text>
  <text x="480" y="68" text-anchor="middle" fill="#f8fafc" font-size="26" font-weight="800" letter-spacing="1">WASTED AI TOKENS</text>
  <line x1="340" y1="80" x2="620" y2="80" stroke="#334155" stroke-width="1"/>

  <!-- ═══ ROW 1: THE CRISIS (3 stat cards) ═══ -->

  <!-- Card 1: DC Energy -->
  <rect x="30" y="100" width="290" height="120" rx="12" fill="#1e1b2e" stroke="#312e4a" stroke-width="1"/>
  <text x="175" y="128" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1.5">DATA CENTER ENERGY</text>
  <text x="175" y="168" text-anchor="middle" fill="#fca5a5" font-size="36" font-weight="800" filter="url(#glow-red)">2x</text>
  <text x="175" y="190" text-anchor="middle" fill="#94a3b8" font-size="11">demand doubles by 2030 to ~945 TWh</text>
  <text x="175" y="208" text-anchor="middle" fill="#64748b" font-size="9">More than Japan's entire consumption [1]</text>

  <!-- Card 2: CO2 -->
  <rect x="335" y="100" width="290" height="120" rx="12" fill="#1e1b2e" stroke="#312e4a" stroke-width="1"/>
  <text x="480" y="128" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1.5">CO2 EMISSIONS</text>
  <text x="480" y="168" text-anchor="middle" fill="#fca5a5" font-size="36" font-weight="800" filter="url(#glow-red)">320M</text>
  <text x="480" y="190" text-anchor="middle" fill="#94a3b8" font-size="11">tonnes CO2 from data centers by 2035</text>
  <text x="480" y="208" text-anchor="middle" fill="#64748b" font-size="9">Up from 220M in 2024. AI is the largest driver [2]</text>

  <!-- Card 3: Token Waste -->
  <rect x="640" y="100" width="290" height="120" rx="12" fill="#1e1b2e" stroke="#312e4a" stroke-width="1"/>
  <text x="785" y="128" text-anchor="middle" fill="#f87171" font-size="11" font-weight="700" letter-spacing="1.5">AGENT TOKEN WASTE</text>
  <text x="785" y="168" text-anchor="middle" fill="#fca5a5" font-size="36" font-weight="800" filter="url(#glow-red)">59.4%</text>
  <text x="785" y="190" text-anchor="middle" fill="#94a3b8" font-size="11">of tokens spent re-reading, not coding</text>
  <text x="785" y="208" text-anchor="middle" fill="#64748b" font-size="9">LLM inference = 90%+ of AI power [3][4]</text>

  <!-- ═══ THE CHAIN (center arrow flow) ═══ -->
  <text x="480" y="252" text-anchor="middle" fill="#64748b" font-size="10" font-weight="600" letter-spacing="2">THE CHAIN: EVERY WASTED TOKEN HAS A COST</text>

  <!-- Chain boxes -->
  <rect x="30" y="268" width="170" height="40" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <text x="115" y="293" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Wasted Tokens</text>

  <text x="215" y="292" text-anchor="middle" fill="#475569" font-size="16">&#8594;</text>

  <rect x="230" y="268" width="170" height="40" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <text x="315" y="293" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">GPU Inference Cycles</text>

  <text x="415" y="292" text-anchor="middle" fill="#475569" font-size="16">&#8594;</text>

  <rect x="430" y="268" width="170" height="40" rx="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.7"/>
  <text x="515" y="293" text-anchor="middle" fill="#fcd34d" font-size="11" font-weight="600">DC Energy Demand</text>

  <text x="615" y="292" text-anchor="middle" fill="#475569" font-size="16">&#8594;</text>

  <rect x="630" y="268" width="170" height="40" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.7"/>
  <text x="715" y="293" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">Carbon Emissions</text>

  <text x="815" y="292" text-anchor="middle" fill="#475569" font-size="16">&#8594;</text>

  <rect x="830" y="268" width="105" height="40" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" opacity="0.9"/>
  <text x="882" y="288" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">CLIMATE</text>
  <text x="882" y="301" text-anchor="middle" fill="#fca5a5" font-size="10" font-weight="700">IMPACT</text>

  <!-- ═══ ROW 2: VIEWGRAPH'S MEASURED IMPACT ═══ -->

  <text x="480" y="345" text-anchor="middle" fill="#4ade80" font-size="14" font-weight="700" letter-spacing="1">VIEWGRAPH BREAKS THE CHAIN</text>
  <text x="480" y="360" text-anchor="middle" fill="#64748b" font-size="9">Measured across 243 captures from 4 projects + 48 websites [5]</text>
  <line x1="340" y1="368" x2="620" y2="368" stroke="#22c55e" stroke-width="1" opacity="0.3"/>

  <!-- Bar chart: Before vs After -->
  <!-- Labels -->
  <text x="100" y="398" text-anchor="end" fill="#94a3b8" font-size="10" font-weight="600">10-step task</text>
  <text x="100" y="438" text-anchor="end" fill="#94a3b8" font-size="10" font-weight="600">Per capture</text>
  <text x="100" y="478" text-anchor="end" fill="#94a3b8" font-size="10" font-weight="600">Interactive only</text>
  <text x="100" y="518" text-anchor="end" fill="#94a3b8" font-size="10" font-weight="600">File receipt</text>

  <!-- Before bars (red) -->
  <rect x="110" y="387" width="680" height="14" rx="3" fill="url(#red-glow)" opacity="0.8"/>
  <text x="800" y="399" fill="#fca5a5" font-size="10" font-weight="700">1,000,000</text>

  <rect x="110" y="427" width="60" height="14" rx="3" fill="url(#red-glow)" opacity="0.8"/>
  <text x="180" y="439" fill="#fca5a5" font-size="10" font-weight="700">88,195</text>

  <rect x="110" y="467" width="60" height="14" rx="3" fill="url(#red-glow)" opacity="0.8"/>
  <text x="180" y="479" fill="#fca5a5" font-size="10" font-weight="700">88,195</text>

  <rect x="110" y="507" width="60" height="14" rx="3" fill="url(#red-glow)" opacity="0.8"/>
  <text x="180" y="519" fill="#fca5a5" font-size="10" font-weight="700">88,195</text>

  <!-- After bars (green) -->
  <rect x="110" y="405" width="22" height="14" rx="3" fill="url(#green-glow)" filter="url(#glow-green)"/>
  <text x="140" y="417" fill="#4ade80" font-size="10" font-weight="700">32,000</text>
  <text x="210" y="417" fill="#22c55e" font-size="10" font-weight="800">97% less</text>
  <text x="300" y="417" fill="#475569" font-size="8">1 full + 9 receipts + reads [5]</text>

  <rect x="110" y="445" width="52" height="14" rx="3" fill="url(#green-glow)" filter="url(#glow-green)"/>
  <text x="170" y="457" fill="#4ade80" font-size="10" font-weight="700">76,861</text>
  <text x="240" y="457" fill="#22c55e" font-size="10" font-weight="800">13% less</text>
  <text x="320" y="457" fill="#475569" font-size="8">v3 full format, median [5]</text>

  <rect x="110" y="485" width="2" height="14" rx="1" fill="url(#green-glow)" filter="url(#glow-green)"/>
  <text x="122" y="497" fill="#4ade80" font-size="10" font-weight="700">1,930</text>
  <text x="180" y="497" fill="#22c55e" font-size="10" font-weight="800">98% less</text>
  <text x="260" y="497" fill="#475569" font-size="8">Action Manifest only, median [5]</text>

  <rect x="110" y="525" width="1" height="14" rx="1" fill="url(#green-glow)" filter="url(#glow-green)"/>
  <text x="120" y="537" fill="#4ade80" font-size="10" font-weight="700">63</text>
  <text x="150" y="537" fill="#22c55e" font-size="10" font-weight="800">99.9% less</text>
  <text x="250" y="537" fill="#475569" font-size="8">File-backed receipt, avg [5]</text>

  <!-- Legend -->
  <rect x="110" y="555" width="10" height="10" rx="2" fill="url(#red-glow)" opacity="0.8"/>
  <text x="126" y="564" fill="#94a3b8" font-size="9">Without ViewGraph (v2 baseline)</text>
  <rect x="290" y="555" width="10" height="10" rx="2" fill="url(#green-glow)"/>
  <text x="306" y="564" fill="#94a3b8" font-size="9">With ViewGraph v3</text>

  <!-- ═══ ROW 3: BOTTOM LINE ═══ -->

  <rect x="30" y="580" width="900" height="80" rx="12" fill="#0f2a1a" stroke="#166534" stroke-width="1"/>

  <!-- Left: cost -->
  <text x="155" y="605" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700" letter-spacing="1">COST PER 10-STEP TASK</text>
  <text x="100" y="635" text-anchor="middle" fill="#fca5a5" font-size="22" font-weight="800" text-decoration="line-through">$3.00</text>
  <text x="155" y="635" text-anchor="middle" fill="#64748b" font-size="16">&#8594;</text>
  <text x="210" y="635" text-anchor="middle" fill="#4ade80" font-size="22" font-weight="800" filter="url(#glow-green)">$0.10</text>
  <text x="155" y="650" text-anchor="middle" fill="#64748b" font-size="9">At $3/M tokens (Claude 3.5 Sonnet) [5]</text>

  <!-- Center: monthly -->
  <line x1="310" y1="592" x2="310" y2="652" stroke="#166534" stroke-width="1"/>
  <text x="480" y="605" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700" letter-spacing="1">MONTHLY SAVINGS (50 tasks/day)</text>
  <text x="480" y="638" text-anchor="middle" fill="#4ade80" font-size="28" font-weight="800" filter="url(#glow-green)">$4,350 / dev</text>
  <text x="480" y="650" text-anchor="middle" fill="#64748b" font-size="9">$4,500 -> $150/month per developer [5]</text>

  <!-- Right: environmental -->
  <line x1="650" y1="592" x2="650" y2="652" stroke="#166534" stroke-width="1"/>
  <text x="785" y="605" text-anchor="middle" fill="#86efac" font-size="11" font-weight="700" letter-spacing="1">WHAT THAT MEANS</text>
  <text x="785" y="630" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Less compute. Less energy.</text>
  <text x="785" y="648" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">Less carbon. Every session.</text>

  <!-- Footer citations -->
  <text x="480" y="675" text-anchor="middle" fill="#475569" font-size="7.5">[1] IEA Energy and AI (2025)  [2] IEA AI and Climate Change  [3] arXiv 2601.14470  [4] arXiv 2512.03024  [5] ViewGraph token-efficiency-v3 experiment, 243 captures, 4 projects + 48 websites</text>
</svg>
